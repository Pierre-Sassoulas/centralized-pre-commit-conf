configuration_files:
  - ".flake8"
  - ".isort.cfg"
  - ".pre-commit-config.yaml"
  - ".pylintrc"
repository: https://raw.githubusercontent.com/Pierre-Sassoulas/centralized-pre-commit-conf
branch: master
token: ""
provider: "raw"
path: "centralized_pre_commit_conf/static"
dependencies: ["black==19.3b0", "isort==4.3.15", "pylint", "flake8"]
gitignore_info_text:
  "# Configuration file added automatically by 'centralized-pre-commit-conf'"
# Cache files/directories generated by a tool, keyed by the tool's
# configuration file. When a configuration file is installed and
# 'update_gitignore' is on, its cache entries are added to the .gitignore too.
cache_files:
  ".mypy.ini": [".mypy_cache/"]
  "mypy.ini": [".mypy_cache/"]
  "pytest.ini": [".pytest_cache/"]
  ".ruff.toml": [".ruff_cache/"]
  "ruff.toml": [".ruff_cache/"]
update_gitignore: False
replace_existing: False
verbose: False
insecure: False
